services:
  - type: web
    name: clara-backend
    runtime: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0

      # ── Agent toggles ──────────────────────────────────────────────────────
      - key: VOICE_INPUT_ENABLED
        value: "false"          # No pyaudio on Render — frontend calls /api/sales/calls/tts
      - key: SUPPORT_AGENT_ENABLED
        value: "true"           # Ticket API routes need the agent enabled
      - key: SALES_AGENT_ENABLED
        value: "true"
      - key: MARKETING_AGENT_ENABLED
        value: "true"

      # ── STT / TTS / LLM ───────────────────────────────────────────────────
      - key: STT_MODEL
        value: groq             # Groq Whisper for speech-to-text
      - key: TTS_MODEL
        value: elevenlabs       # ElevenLabs for text-to-speech (replaces local Piper)

      # ── Secrets: set these in the Render dashboard, NOT here ──────────────
      # GROQ_API_KEY              (Groq LLM + Whisper STT)
      # ELEVENLABS_API_KEY        (ElevenLabs TTS — REQUIRED for voice calls)
      # GEMINI_API_KEY            (Google Gemini for marketing agent)
      # SUPABASE_URL
      # SUPABASE_ANON_KEY
      # SUPABASE_SERVICE_KEY
      # RESEND_API_KEY            (email sending)
      # ALLOWED_ORIGINS           (comma-separated Vercel URLs, e.g. https://final-year-project-seven-liard.vercel.app)
